<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
  }

  .poster {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(160deg, #ffffff 0%, #f8f6f0 50%, #f0ece2 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
  }

  /* Portuguese flag accent - top bar */
  .flag-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 8px;
    display: flex;
  }
  .flag-green { flex: 2; background: #006600; }
  .flag-red { flex: 3; background: #FF0000; }

  /* Bottom bar */
  .flag-bar-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 8px;
    display: flex;
  }

  /* Decorative circle */
  .deco-circle {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 2px solid rgba(0, 102, 0, 0.08);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .deco-circle-2 {
    position: absolute;
    width: 550px;
    height: 550px;
    border-radius: 50%;
    border: 1px solid rgba(255, 0, 0, 0.06);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Shield / coat of arms */
  .shield {
    width: 90px;
    height: 110px;
    margin-bottom: 20px;
    position: relative;
  }
  .shield svg {
    width: 100%;
    height: 100%;
  }

  .content {
    text-align: center;
    z-index: 2;
    padding: 40px;
  }

  .subtitle-top {
    font-size: 18px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 15px;
    font-weight: 600;
  }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 700;
    color: #006600;
    line-height: 1.1;
    margin-bottom: 8px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.05);
  }

  .main-title-2 {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 700;
    color: #CC0000;
    line-height: 1.1;
    margin-bottom: 30px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.05);
  }

  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, #006600, #CC0000);
    margin: 0 auto 30px;
  }

  .service-box {
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(0,102,0,0.15);
    border-radius: 12px;
    padding: 28px 40px;
    margin-bottom: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .service-text {
    font-size: 22px;
    color: #333;
    line-height: 1.6;
    font-weight: 500;
  }

  .service-text strong {
    color: #006600;
    font-weight: 700;
  }

  .covers {
    font-size: 20px;
    color: #555;
    margin-bottom: 35px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .price-section {
    margin-bottom: 20px;
  }

  .price-label {
    font-size: 16px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .price {
    font-family: 'Montserrat', sans-serif;
    font-size: 64px;
    font-weight: 900;
    background: linear-gradient(135deg, #006600, #008800);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 10px;
  }

  .installments {
    font-size: 22px;
    color: #CC0000;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .contact {
    position: absolute;
    bottom: 40px;
    text-align: center;
    font-size: 14px;
    color: #999;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Portuguese armillary sphere simplified */
  .armillary {
    position: absolute;
    bottom: 80px;
    right: 60px;
    opacity: 0.06;
    font-size: 200px;
    color: #006600;
  }
</style>
</head>
<body>
<div class="poster">
  <div class="flag-bar">
    <div class="flag-green"></div>
    <div class="flag-red"></div>
  </div>

  <div class="deco-circle"></div>
  <div class="deco-circle-2"></div>

  <div class="armillary">⊕</div>

  <div class="content">
    <div class="subtitle-top">Servicios Profesionales</div>

    <div class="main-title">CIUDADANÍA</div>
    <div class="main-title-2">PORTUGUESA</div>

    <div class="divider"></div>

    <div class="service-box">
      <div class="service-text">
        Armado de carpeta <strong>+</strong> turno<br>
        para presentación en el Consulado de Portugal
      </div>
    </div>

    <div class="covers">Hijos y nietos de ciudadanos portugueses</div>

    <div class="price-section">
      <div class="price-label">Precio</div>
      <div class="price">USD 700</div>
      <div class="installments">Pagaderos en 2 cuotas</div>
    </div>
  </div>

  <div class="flag-bar-bottom">
    <div class="flag-green"></div>
    <div class="flag-red"></div>
  </div>
</div>
</body>
</html>
